<!-- VioNest - Log In -->
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VioNest - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#39005f",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#e5e2e1",
                        "tertiary-container": "#562f00",
                        "tertiary-fixed": "#ffdcbf",
                        "surface-dim": "#d9dadb",
                        "secondary-container": "#e2dfde",
                        "primary-container": "#57068c",
                        "on-tertiary-fixed": "#2d1600",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#673d0c",
                        "on-secondary-container": "#636262",
                        "tertiary": "#381c00",
                        "on-surface": "#191c1d",
                        "primary-fixed-dim": "#e0b6ff",
                        "outline": "#7e7383",
                        "on-tertiary-container": "#d0965f",
                        "on-primary-container": "#c985ff",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed": "#2e004e",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#191c1d",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#cfc2d3",
                        "background": "#f8f9fa",
                        "surface-container": "#edeeef",
                        "surface-bright": "#f8f9fa",
                        "on-error-container": "#93000a",
                        "surface-tint": "#803db5",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-surface-variant": "#4c4451",
                        "on-secondary-fixed-variant": "#474746",
                        "on-primary-fixed-variant": "#66209b",
                        "primary-fixed": "#f2daff",
                        "surface": "#f8f9fa",
                        "secondary": "#5f5e5e",
                        "inverse-primary": "#e0b6ff",
                        "surface-container-low": "#f3f4f5",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-lg": "2rem",
                        "margin-mobile": "1rem",
                        "margin-desktop": "2rem",
                        "gutter": "1.5rem",
                        "stack-md": "1rem",
                        "container-max": "1280px",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "display-price": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-price": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background min-h-screen flex items-center justify-center font-sans antialiased">
    <!-- Login Container -->
    <main class="w-full max-w-md px-margin-mobile md:px-0">
        <div
            class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-8 md:p-10 flex flex-col items-center">
            <!-- Logo Section -->
            <div class="mb-stack-lg flex justify-center w-full">
                <img alt="VioNest Logo" class="h-16 object-contain"
                    src="https://lh3.googleusercontent.com/aida/AP1WRLsWh_nrTl92LpVUn3KOp6yOeUNJ6oDz8e1BvYIEBAs2Re2tNoy_ZkPXVgAzHPrRtasiH2Tx2scT0OrEtL1qxo9PhPH8L6ChE7weWRWTtykPQeMyWmEieOk4olGSHzVtpu9JWiqYRX5YTqeo_Zo5xyyoolYHcC8MDk1zc92bHhCl1lQ5YFSRdqYxRUqU-vzsV5cQeNmZlHUQr5YfDFdEuERfhSGyqpHt4bTbdYXvIxPt1MghSwxKvfvnDbxR" />
            </div>
            <!-- Heading -->
            <h1 class="font-headline-md text-headline-md text-on-surface mb-stack-lg text-center w-full">
                Welcome Back
            </h1>
            <!-- Form -->
            <form action="#" class="w-full flex flex-col gap-stack-md" method="POST">
                <!-- Email Input -->
                <div class="flex flex-col gap-1">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">
                        NYU Email
                    </label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
                            style="font-variation-settings: 'FILL' 0;">
                            mail
                        </span>
                        <input
                            class="w-full pl-10 pr-4 py-2 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow"
                            id="email" name="email" placeholder="NetID@nyu.edu" required="" type="email" />
                    </div>
                </div>
                <!-- Password Input -->
                <div class="flex flex-col gap-1">
                    <div class="flex justify-between items-center">
                        <label class="font-label-sm text-label-sm text-on-surface-variant" for="password">
                            Password
                        </label>
                        <a class="font-label-sm text-label-sm text-primary hover:underline" href="#">
                            Forgot password?
                        </a>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
                            style="font-variation-settings: 'FILL' 0;">
                            lock
                        </span>
                        <input
                            class="w-full pl-10 pr-10 py-2 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors"
                            type="button">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">
                                visibility_off
                            </span>
                        </button>
                    </div>
                </div>
                <!-- Submit Button -->
                <button
                    class="mt-stack-sm w-full bg-primary-container text-on-primary py-3 px-4 rounded-lg font-headline-sm text-headline-sm hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2"
                    type="submit">
                    Log In
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">
                        arrow_forward
                    </span>
                </button>
            </form>
            <!-- Sign Up Link -->
            <p class="mt-stack-lg font-body-md text-body-md text-on-surface-variant text-center">
                Don't have an account?
                <a class="text-primary font-semibold hover:underline" href="#">
                    Sign up
                </a>
            </p>
            <!-- Security Badge -->
            <div
                class="mt-stack-lg flex items-center justify-center gap-2 bg-surface-container py-2 px-4 rounded-full border border-outline-variant w-full max-w-[200px]">
                <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">
                    verified_user
                </span>
                <span class="font-label-sm text-label-sm text-on-surface-variant">
                    NYU SSO Secured
                </span>
            </div>
        </div>
    </main>
</body>

</html>

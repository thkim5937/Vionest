<!-- VioNest - Select Payment Method -->
<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Payment Method - VioNest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#39005f",
                        "on-tertiary-fixed": "#2d1600",
                        "inverse-primary": "#e0b6ff",
                        "surface": "#f8f9fa",
                        "inverse-surface": "#2e3132",
                        "surface-container-high": "#e7e8e9",
                        "on-background": "#191c1d",
                        "on-tertiary-container": "#d0965f",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "background": "#f8f9fa",
                        "primary-fixed-dim": "#e0b6ff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed": "#1b1c1c",
                        "primary-fixed": "#f2daff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "outline-variant": "#cfc2d3",
                        "on-secondary-container": "#636262",
                        "on-surface-variant": "#4c4451",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#803db5",
                        "tertiary-fixed": "#ffdcbf",
                        "tertiary": "#381c00",
                        "outline": "#7e7383",
                        "surface-container-low": "#f3f4f5",
                        "on-primary-container": "#c985ff",
                        "error": "#ba1a1a",
                        "secondary": "#5f5e5e",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#e2dfde",
                        "on-tertiary-fixed-variant": "#673d0c",
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#e5e2e1",
                        "primary-container": "#57068c",
                        "on-primary-fixed-variant": "#66209b",
                        "on-secondary-fixed-variant": "#474746",
                        "on-primary-fixed": "#2e004e",
                        "tertiary-container": "#562f00",
                        "surface-dim": "#d9dadb",
                        "on-error": "#ffffff",
                        "on-surface": "#191c1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "stack-lg": "2rem",
                        "stack-md": "1rem",
                        "margin-mobile": "1rem",
                        "margin-desktop": "2rem",
                        "gutter": "1.5rem",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-price": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-price": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
    <!-- TopAppBar JSON execution -->
    <header
        class="w-full top-0 sticky flex items-center justify-between px-margin-mobile h-16 bg-surface dark:bg-background border-b border-outline-variant dark:border-outline z-40">
        <button aria-label="Go back"
            class="text-on-surface-variant dark:text-on-secondary-container hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:opacity-70 p-2 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1
            class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary truncate flex-1 text-center">
            Payment</h1>
        <button aria-label="Help"
            class="text-on-surface-variant dark:text-on-secondary-container hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:opacity-70 p-2 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
        </button>
    </header>
    <main
        class="flex-1 overflow-y-auto px-margin-mobile py-stack-lg max-w-2xl mx-auto w-full flex flex-col gap-stack-lg pb-32">
        <!-- Summary Card -->
        <section
            class="bg-surface-container-low rounded-xl p-stack-md border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
            <h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Payment Summary
            </h2>
            <div class="flex justify-between items-start gap-4">
                <div>
                    <p class="font-headline-sm text-headline-sm text-on-background">123 Bleecker St, Unit 4B</p>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-1">Monthly Rent</p>
                </div>
                <div class="text-right">
                    <p class="font-display-price text-display-price text-primary-container">$2,400</p>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-1">/ month</p>
                </div>
            </div>
        </section>
        <!-- Payment Methods -->
        <section class="flex flex-col gap-stack-md">
            <h3 class="font-headline-sm text-headline-sm text-on-background mb-2">Select Payment Method</h3>
            <form class="flex flex-col gap-3">
                <!-- Option 1: Credit / Debit Card (Selected) -->
                <label
                    class="relative flex items-center p-4 cursor-pointer rounded-xl border-2 border-primary-container bg-surface-container-lowest transition-all">
                    <input checked="" class="peer sr-only" name="payment_method" type="radio" value="card" />
                    <div
                        class="flex items-center justify-center w-5 h-5 rounded-full border-2 border-primary-container mr-4">
                        <div class="w-2.5 h-2.5 bg-primary-container rounded-full scale-100 transition-transform"></div>
                    </div>
                    <div class="flex items-center gap-3 flex-1">
                        <span class="material-symbols-outlined text-primary-container"
                            data-icon="credit_card">credit_card</span>
                        <span class="font-body-lg text-body-lg text-on-background font-medium">Credit / Debit
                            Card</span>
                    </div>
                </label>
                <!-- Option 2: Bank Transfer -->
                <label
                    class="relative flex items-center p-4 cursor-pointer rounded-xl border border-outline-variant bg-surface hover:bg-surface-container-lowest transition-all">
                    <input class="peer sr-only" name="payment_method" type="radio" value="bank" />
                    <div
                        class="flex items-center justify-center w-5 h-5 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary-container">
                        <div
                            class="w-2.5 h-2.5 bg-primary-container rounded-full scale-0 peer-checked:scale-100 transition-transform">
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-1 opacity-80 peer-checked:opacity-100">
                        <span class="material-symbols-outlined text-on-surface-variant"
                            data-icon="account_balance">account_balance</span>
                        <span class="font-body-lg text-body-lg text-on-background">Bank Transfer (ACH)</span>
                    </div>
                </label>
                <!-- Option 3: Venmo -->
                <label
                    class="relative flex items-center p-4 cursor-pointer rounded-xl border border-outline-variant bg-surface hover:bg-surface-container-lowest transition-all">
                    <input class="peer sr-only" name="payment_method" type="radio" value="venmo" />
                    <div
                        class="flex items-center justify-center w-5 h-5 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary-container">
                        <div
                            class="w-2.5 h-2.5 bg-primary-container rounded-full scale-0 peer-checked:scale-100 transition-transform">
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-1 opacity-80 peer-checked:opacity-100">
                        <span class="material-symbols-outlined text-on-surface-variant"
                            data-icon="payments">payments</span>
                        <span class="font-body-lg text-body-lg text-on-background">Venmo</span>
                    </div>
                </label>
                <!-- Option 4: Zelle -->
                <label
                    class="relative flex items-center p-4 cursor-pointer rounded-xl border border-outline-variant bg-surface hover:bg-surface-container-lowest transition-all">
                    <input class="peer sr-only" name="payment_method" type="radio" value="zelle" />
                    <div
                        class="flex items-center justify-center w-5 h-5 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary-container">
                        <div
                            class="w-2.5 h-2.5 bg-primary-container rounded-full scale-0 peer-checked:scale-100 transition-transform">
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-1 opacity-80 peer-checked:opacity-100">
                        <span class="material-symbols-outlined text-on-surface-variant"
                            data-icon="currency_exchange">currency_exchange</span>
                        <span class="font-body-lg text-body-lg text-on-background">Zelle</span>
                    </div>
                </label>
            </form>
        </section>
    </main>
    <!-- Bottom Actions (Sticky) -->
    <div
        class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-sm border-t border-outline-variant p-margin-mobile pb-safe flex flex-col gap-4 z-40">
        <div class="max-w-2xl mx-auto w-full flex flex-col items-center">
            <button
                class="w-full bg-primary-container text-on-primary py-3 px-6 rounded-full font-headline-sm text-headline-sm hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-[0.98]">
                Continue
            </button>
            <button
                class="mt-4 font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors underline-offset-4 hover:underline">
                Cancel
            </button>
        </div>
    </div>
    <!-- Script to handle radio button styling logic (optional enhancement for visual feedback) -->
    <script>
        document.querySelectorAll('input[type="radio"][name="payment_method"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Reset all labels
                document.querySelectorAll('input[type="radio"][name="payment_method"]').forEach(r => {
                    const label = r.closest('label');
                    label.classList.remove('border-2', 'border-primary-container', 'bg-surface-container-lowest');
                    label.classList.add('border', 'border-outline-variant', 'bg-surface');

                    const icon = label.querySelector('.material-symbols-outlined');
                    icon.classList.remove('text-primary-container');
                    icon.classList.add('text-on-surface-variant');

                    const text = label.querySelector('span:not(.material-symbols-outlined)');
                    text.classList.remove('font-medium');
                });

                // Set active label
                if (e.target.checked) {
                    const activeLabel = e.target.closest('label');
                    activeLabel.classList.remove('border', 'border-outline-variant', 'bg-surface');
                    activeLabel.classList.add('border-2', 'border-primary-container', 'bg-surface-container-lowest');

                    const activeIcon = activeLabel.querySelector('.material-symbols-outlined');
                    activeIcon.classList.remove('text-on-surface-variant');
                    activeIcon.classList.add('text-primary-container');

                    const activeText = activeLabel.querySelector('span:not(.material-symbols-outlined)');
                    activeText.classList.add('font-medium');
                }
            });
        });
    </script>
</body>

</html>

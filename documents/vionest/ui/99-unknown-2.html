<!-- VioNest - NYU Duo Verification (Updated) -->
<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NYU SSO - Duo Push Confirmation</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed-variant": "#474746",
                        "inverse-primary": "#e0b6ff",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "on-error-container": "#93000a",
                        "outline": "#7e7383",
                        "error": "#ba1a1a",
                        "inverse-surface": "#2e3132",
                        "on-primary-container": "#c985ff",
                        "on-surface-variant": "#4c4451",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#562f00",
                        "surface-container-highest": "#e1e3e4",
                        "secondary-container": "#e2dfde",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#e0b6ff",
                        "primary-container": "#57068c",
                        "on-secondary-container": "#636262",
                        "on-tertiary-fixed": "#2d1600",
                        "tertiary": "#381c00",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-error": "#ffffff",
                        "background": "#f8f9fa",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#d0965f",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "surface-container-low": "#f3f4f5",
                        "surface": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "on-primary": "#ffffff",
                        "primary": "#39005f",
                        "outline-variant": "#cfc2d3",
                        "surface-bright": "#f8f9fa",
                        "tertiary-fixed": "#ffdcbf",
                        "surface-container-high": "#e7e8e9",
                        "on-background": "#191c1d",
                        "surface-tint": "#803db5",
                        "surface-container": "#edeeef",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary-fixed-variant": "#66209b",
                        "primary-fixed": "#f2daff",
                        "on-primary-fixed": "#2e004e",
                        "on-tertiary-fixed-variant": "#673d0c",
                        "secondary": "#5f5e5e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    }
                }
            }
        }
    </script>
    <style>
        .watermark-pattern {
            background-image: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 40px,
                    rgba(255, 255, 255, 0.03) 40px,
                    rgba(255, 255, 255, 0.03) 80px);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-primary min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-sans text-on-surface p-4">
    <!-- Background Watermark -->
    <div class="absolute inset-0 watermark-pattern pointer-events-none z-0"></div>
    <!-- Main Authentication Card -->
    <main class="bg-white w-full max-w-[440px] rounded shadow-lg relative z-10 flex flex-col pt-10 pb-8 px-10">
        <!-- Header / Logo -->
        <header class="flex items-center gap-3 mb-8 w-full">
            <div class="bg-primary w-9 h-9 flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-[24px]"
                    style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
            </div>
            <span class="text-3xl font-bold text-primary tracking-tight">NYU</span>
        </header>
        <!-- Content Area -->
        <div class="flex flex-col text-left">
            <h1 class="text-2xl font-bold text-gray-900 mb-4 w-full">Duo Push Confirmation</h1>
            <p class="text-[15px] text-gray-800 mb-4 w-full">
                Approve the notification to verify your identity.
            </p>
            <p class="text-[14px] text-gray-800 mb-12 w-full">
                Sent to "iOS" (••-••-••••-5937)
            </p>
            <!-- Illustration -->
            <div class="flex flex-col items-center w-full mb-12">
                <div class="relative">
                    <div
                        class="w-32 h-20 bg-[#f1f3f4] rounded-lg shadow-sm border border-gray-200 p-2.5 flex flex-col gap-2.5">
                        <div class="flex gap-2 w-full overflow-hidden">
                            <div class="h-2 bg-[#dce0e3] rounded w-full"></div>
                            <div class="h-2 bg-[#dce0e3] rounded w-full"></div>
                            <div class="h-2 bg-[#dce0e3] rounded w-full"></div>
                        </div>
                        <div class="flex gap-2 items-center">
                            <div
                                class="w-6 h-6 bg-[#4ba246] rounded flex items-center justify-center text-white text-[8px] font-bold tracking-widest">
                                DUO</div>
                            <div class="flex-1 space-y-1.5">
                                <div class="w-full h-1.5 bg-[#dce0e3] rounded"></div>
                                <div class="w-2/3 h-1.5 bg-[#dce0e3] rounded"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Loading Spinner Overlaid -->
                    <div
                        class="absolute -bottom-4 -left-4 w-11 h-11 border-[4px] border-[#e8eaed] border-l-[#0052cc] rounded-full spinner bg-white">
                    </div>
                </div>
            </div>
            <!-- Inner Links -->
            <div class="w-full flex justify-center mb-10">
                <a class="text-[15px] text-[#0052cc] hover:underline cursor-pointer" href="#">
                    Other options
                </a>
            </div>
            <!-- Outer Help Link (Inside Card in new layout) -->
            <div class="w-full flex justify-start">
                <a class="text-[13px] text-gray-600 hover:underline cursor-pointer underline" href="#">
                    Need help?
                </a>
            </div>
        </div>
    </main>
</body>

</html>

<!-- VioNest - Lifestyle Profile Setup -->
<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lifestyle Profile Setup - VioNest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#c985ff",
                        "outline": "#7e7383",
                        "primary": "#39005f",
                        "on-surface": "#191c1d",
                        "tertiary": "#381c00",
                        "surface-tint": "#803db5",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#f2daff",
                        "on-tertiary-fixed-variant": "#673d0c",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "on-secondary-container": "#636262",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#2e004e",
                        "surface-container": "#edeeef",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#e0b6ff",
                        "secondary": "#5f5e5e",
                        "surface-bright": "#f8f9fa",
                        "outline-variant": "#cfc2d3",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#d0965f",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-fixed": "#ffdcbf",
                        "on-primary-fixed-variant": "#66209b",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-tertiary-fixed": "#2d1600",
                        "on-surface-variant": "#4c4451",
                        "on-error": "#ffffff",
                        "tertiary-container": "#562f00",
                        "primary-fixed-dim": "#e0b6ff",
                        "error-container": "#ffdad6",
                        "primary-container": "#57068c",
                        "surface-dim": "#d9dadb",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-background": "#191c1d",
                        "on-secondary-fixed-variant": "#474746",
                        "on-error-container": "#93000a",
                        "secondary-container": "#e2dfde",
                        "inverse-surface": "#2e3132"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-lg": "2rem",
                        "margin-desktop": "2rem",
                        "container-max": "1280px",
                        "stack-sm": "0.5rem",
                        "margin-mobile": "1rem",
                        "stack-md": "1rem",
                        "gutter": "1.5rem"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-price": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-price": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .custom-radio {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 2px solid #cfc2d3;
            border-radius: 50%;
            display: grid;
            place-content: center;
        }

        .custom-radio::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #57068c;
        }

        .custom-radio:checked::before {
            transform: scale(1);
        }

        .custom-radio:checked {
            border-color: #57068c;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface-container-lowest text-on-surface antialiased">
    <!-- Top Navigation (Transactional, minimal nav) -->
    <header
        class="flex justify-between items-center px-margin-mobile py-4 w-full sticky top-0 bg-surface-container-lowest z-10">
        <div class="flex items-center gap-2 font-headline-md text-headline-md font-bold text-on-surface">
            VioNest
            <div class="w-px h-5 bg-outline-variant mx-1"></div>
            <span class="material-symbols-outlined text-primary-container"
                style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
        </div>
        <button class="text-on-surface-variant p-2 rounded-full hover:bg-surface-container-high transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
    </header>
    <main class="px-margin-mobile pb-24 max-w-md mx-auto w-full">
        <!-- Header Section -->
        <div class="py-stack-lg">
            <h1 class="font-headline-md text-headline-md mb-stack-sm text-primary">Set Up Your Lifestyle Profile</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">This helps us match you with compatible
                listings and tenants.</p>
        </div>
        <form class="flex flex-col gap-stack-lg">
            <!-- Gender Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-2">Gender</legend>
                <div class="flex flex-col gap-3">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="gender" type="radio" value="male" />
                        <span class="font-body-md text-body-md">Male</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="gender" type="radio" value="female" />
                        <span class="font-body-md text-body-md">Female</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="gender" type="radio" value="other" />
                        <span class="font-body-md text-body-md">Other</span>
                    </label>
                </div>
                <p
                    class="font-label-sm text-label-sm text-on-surface-variant mt-2 border-t border-outline-variant pt-2 flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">info</span> Used to filter listings by same
                    gender
                </p>
            </fieldset>
            <!-- Sleep Schedule Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-2">Sleep Schedule</legend>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant" for="bedtime">Bedtime</label>
                        <select
                            class="form-select w-full rounded-DEFAULT border-outline-variant bg-surface-container-lowest text-body-md font-body-md focus:border-primary-container focus:ring-primary-container"
                            id="bedtime" name="bedtime">
                            <option>8:00PM–10:00PM</option>
                            <option>10:00PM–12:00AM</option>
                            <option>12:00AM–2:00AM</option>
                            <option>2:00AM–4:00AM</option>
                            <option>4:00AM–6:00AM</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-label-sm text-label-sm text-on-surface-variant" for="wakeup">Wake-up
                            Time</label>
                        <select
                            class="form-select w-full rounded-DEFAULT border-outline-variant bg-surface-container-lowest text-body-md font-body-md focus:border-primary-container focus:ring-primary-container"
                            id="wakeup" name="wakeup">
                            <option>4:00AM–6:00AM</option>
                            <option>6:00AM–8:00AM</option>
                            <option>8:00AM–10:00AM</option>
                            <option>10:00AM–12:00PM</option>
                            <option>12:00PM–2:00PM</option>
                        </select>
                    </div>
                </div>
            </fieldset>
            <!-- Smoking Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-2">Smoking</legend>
                <div class="flex gap-6">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="smoking" type="radio" value="yes" />
                        <span class="font-body-md text-body-md">Yes</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="smoking" type="radio" value="no" />
                        <span class="font-body-md text-body-md">No</span>
                    </label>
                </div>
            </fieldset>
            <!-- Cooking Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-2">Cooking</legend>
                <div class="flex gap-6">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="cooking" type="radio" value="yes" />
                        <span class="font-body-md text-body-md">Yes</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="cooking" type="radio" value="no" />
                        <span class="font-body-md text-body-md">No</span>
                    </label>
                </div>
            </fieldset>
            <!-- Pets Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-2">Pets</legend>
                <div class="flex gap-6">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="pets" type="radio" value="yes" />
                        <span class="font-body-md text-body-md">Yes</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input class="custom-radio" name="pets" type="radio" value="no" />
                        <span class="font-body-md text-body-md">No</span>
                    </label>
                </div>
            </fieldset>
            <!-- Guest Frequency Section -->
            <fieldset
                class="bg-surface p-stack-md rounded-xl border border-outline-variant shadow-sm flex flex-col gap-stack-sm">
                <legend class="font-headline-sm text-headline-sm text-on-surface mb-3">Guest Frequency</legend>
                <div class="flex flex-wrap gap-2">
                    <label class="cursor-pointer">
                        <input class="peer sr-only" name="guests" type="radio" value="weekly" />
                        <div
                            class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">
                            Weekly or more
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input class="peer sr-only" name="guests" type="radio" value="monthly" />
                        <div
                            class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">
                            1–2 times a month
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input class="peer sr-only" name="guests" type="radio" value="yearly" />
                        <div
                            class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">
                            A few times a year
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input class="peer sr-only" name="guests" type="radio" value="rarely" />
                        <div
                            class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md peer-checked:bg-primary-container peer-checked:text-on-primary peer-checked:border-primary-container transition-colors">
                            Rarely or never
                        </div>
                    </label>
                </div>
            </fieldset>
        </form>
    </main>
    <!-- Sticky CTA Bottom -->
    <div
        class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant p-margin-mobile shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-20">
        <button
            class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-3 rounded-lg hover:bg-on-primary-fixed-variant transition-colors active:scale-[0.98]">
            Complete Profile
        </button>
    </div>
</body>

</html>

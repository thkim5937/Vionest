<!-- VioNest - Sign Up -->
<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VioNest - Sign Up</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#edeeef",
                        "secondary-fixed": "#e5e2e1",

                        "on-error-container": "#93000a",
                        "secondary": "#5f5e5e",

                        "tertiary-container": "#562f00",
                        "outline-variant": "#cfc2d3",

                        "on-primary-container": "#c985ff",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-dim": "#d9dadb",
                        "surface-container-high": "#e7e8e9",
                        "primary": "#39005f",
                        "on-primary-fixed-variant": "#66209b",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "secondary-container": "#e2dfde",
                        "primary-container": "#57068c",
                        "on-secondary-container": "#636262",
                        "on-background": "#191c1d",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "surface-bright": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1d",
                        "inverse-on-surface": "#f0f1f2",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed": "#2d1600",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-container": "#d0965f",
                        "tertiary": "#381c00",
                        "primary-fixed-dim": "#e0b6ff",
                        "outline": "#7e7383",
                        "inverse-primary": "#e0b6ff",
                        "background": "#f8f9fa",
                        "primary-fixed": "#f2daff",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e1e3e4",
                        "on-surface-variant": "#4c4451"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-lg": "2rem",
                        "container-max": "1280px",
                        "stack-sm": "0.5rem",
                        "gutter": "1.5rem",
                        "margin-desktop": "2rem",
                        "margin-mobile": "1rem",
                        "stack-md": "1rem"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-sm": ["Inter"],
                        "display-price": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-price": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

                },
            },
        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-surface-container-lowest min-h-screen flex items-center justify-center p-margin-mobile font-body-md text-on-surface">
    <main class="w-full max-w-[400px] flex flex-col gap-stack-lg">
        <!-- Header -->
        <header class="flex flex-col items-center text-center gap-stack-sm">
            <img alt="VioNest and NYU Dual Logo" class="h-24 w-auto mb-4 object-contain"
                src="https://lh3.googleusercontent.com/aida/AP1WRLsWh_nrTl92LpVUn3KOp6yOeUNJ6oDz8e1BvYIEBAs2Re2tNoy_ZkPXVgAzHPrRtasiH2Tx2scT0OrEtL1qxo9PhPH8L6ChE7weWRWTtykPQeMyWmEieOk4olGSHzVtpu9JWiqYRX5YTqeo_Zo5xyyoolYHcC8MDk1zc92bHhCl1lQ5YFSRdqYxRUqU-vzsV5cQeNmZlHUQr5YfDFdEuERfhSGyqpHt4bTbdYXvIxPt1MghSwxKvfvnDbxR" />
            <h1 class="font-display-price text-display-price text-on-surface">Create Your Account</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant">VioNest is exclusively for NYU students.</p>
        </header>
        <!-- Form -->
        <form class="flex flex-col gap-stack-md w-full" onsubmit="event.preventDefault();">
            <!-- Email Field Group -->
            <div class="flex flex-col gap-1">
                <label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">NYU Email
                    (NetID@nyu.edu)</label>
                <div class="relative flex items-center">
                    <span class="material-symbols-outlined absolute left-3 text-outline">mail</span>
                    <input
                        class="w-full bg-surface py-3 pl-10 pr-[88px] border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                        id="email" name="email" placeholder="netid@nyu.edu" type="email" />
                    <button
                        class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1.5 bg-primary-container text-on-primary font-label-sm text-label-sm rounded hover:opacity-90 transition-opacity"
                        type="button">
                        Verify
                    </button>
                </div>
                <!-- Verification Status (Hidden by default, shown for demo) -->
                <!-- <div class="flex items-center gap-1 text-[#008542] mt-1 ml-1">
                    <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    <span class="font-label-sm text-label-sm">Verified</span>
                </div> -->
            </div>
            <!-- Password Field Group -->
            <div class="flex flex-col gap-1 mt-2 opacity-50 pointer-events-none">
                <label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Create
                    Password</label>
                <div class="relative flex items-center">
                    <span class="material-symbols-outlined absolute left-3 text-outline">lock</span>
                    <input
                        class="w-full bg-surface py-3 pl-10 pr-4 border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                        disabled="" id="password" name="password" placeholder="••••••••" type="password" />
                </div>
                <p class="font-label-sm text-label-sm text-outline ml-1">Verify your email to continue</p>
            </div>
            <!-- Primary CTA -->
            <button
                class="w-full mt-4 bg-primary-container text-on-primary py-3 rounded-lg font-headline-sm text-headline-sm flex items-center justify-center gap-2 hover:opacity-90 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed"
                disabled="" type="submit">
                Complete Sign-Up
            </button>
        </form>
        <!-- Footer Link -->
        <div class="text-center mt-2">
            <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">
                Already have an account? <span class="font-semibold text-primary">Log in</span>
            </a>
        </div>
    </main>
</body>

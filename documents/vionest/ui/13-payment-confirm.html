<!-- VioNest - Confirm Payment -->
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Confirm Payment - VioNest</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#39005f",
                        "on-tertiary-fixed": "#2d1600",
                        "inverse-primary": "#e0b6ff",
                        "surface": "#f8f9fa",
                        "inverse-surface": "#2e3132",
                        "surface-container-high": "#e7e8e9",
                        "on-background": "#191c1d",
                        "on-tertiary-container": "#d0965f",
                        "tertiary-fixed-dim": "#f8ba7f",
                        "background": "#f8f9fa",
                        "primary-fixed-dim": "#e0b6ff",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed": "#1b1c1c",
                        "primary-fixed": "#f2daff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "outline-variant": "#cfc2d3",
                        "on-secondary-container": "#636262",
                        "on-surface-variant": "#4c4451",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#803db5",
                        "tertiary-fixed": "#ffdcbf",
                        "tertiary": "#381c00",
                        "outline": "#7e7383",
                        "surface-container-low": "#f3f4f5",
                        "on-primary-container": "#c985ff",
                        "error": "#ba1a1a",
                        "secondary": "#5f5e5e",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#e2dfde",
                        "on-tertiary-fixed-variant": "#673d0c",
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#e5e2e1",
                        "primary-container": "#57068c",
                        "on-primary-fixed-variant": "#66209b",
                        "on-secondary-fixed-variant": "#474746",
                        "on-primary-fixed": "#2e004e",
                        "tertiary-container": "#562f00",
                        "surface-dim": "#d9dadb",
                        "on-error": "#ffffff",
                        "on-surface": "#191c1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "stack-lg": "2rem",
                        "stack-md": "1rem",
                        "margin-mobile": "1rem",
                        "margin-desktop": "2rem",
                        "gutter": "1.5rem",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-price": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-price": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background font-body-md h-screen flex flex-col items-center">
    <div
        class="w-full max-w-md h-full flex flex-col relative bg-surface md:shadow-lg md:my-8 md:h-[800px] md:rounded-xl overflow-hidden">
        <!-- TopAppBar -->
        <header
            class="flex items-center justify-between px-margin-mobile h-16 w-full top-0 sticky bg-surface border-b border-outline-variant z-10">
            <button
                class="text-primary hover:bg-surface-container-low transition-colors rounded-full p-2 -ml-2 active:opacity-70 flex items-center justify-center">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
            </button>
            <h1 class="font-headline-md text-headline-md font-bold text-primary flex-1 text-center pr-8">Payment</h1>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>
        <!-- Main Content (Canvas) -->
        <main class="flex-1 overflow-y-auto px-margin-mobile py-stack-md flex flex-col gap-stack-lg">
            <div class="flex flex-col gap-stack-sm text-center pt-4">
                <h2 class="font-display-price text-display-price text-on-background">Confirm Payment</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Please review your transaction details
                    below.</p>
            </div>
            <!-- Summary Card -->
            <div class="bg-surface-container-low rounded-xl p-6 flex flex-col gap-4 border border-outline-variant">
                <div class="flex flex-col gap-1 pb-4 border-b border-outline-variant">
                    <span class="font-label-sm text-label-sm text-on-surface-variant">Listing</span>
                    <span class="font-headline-sm text-headline-sm text-on-background">123 Bleecker St, Unit 4B</span>
                </div>
                <div class="flex flex-col gap-1 pb-4 border-b border-outline-variant">
                    <span class="font-label-sm text-label-sm text-on-surface-variant">Payment Method</span>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-on-surface-variant"
                            style="font-variation-settings: 'FILL' 0;">credit_card</span>
                        <span class="font-body-lg text-body-lg text-on-background">Credit / Debit Card</span>
                    </div>
                </div>
                <div class="flex justify-between items-end pt-2">
                    <span class="font-label-sm text-label-sm text-on-surface-variant">Amount</span>
                    <span class="font-display-price text-display-price text-primary">$2,400</span>
                </div>
            </div>
            <!-- Trust Badge area -->
            <div class="flex items-center justify-center gap-2 mt-4 text-on-surface-variant opacity-80">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock</span>
                <span class="font-label-sm text-label-sm">Secure Payment Processing</span>
            </div>
        </main>
        <!-- Fixed Bottom Action Area -->
        <div
            class="px-margin-mobile py-4 bg-surface border-t border-outline-variant pb-safe pb-8 flex flex-col gap-4 sticky bottom-0 w-full z-20">
            <button
                class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-headline-sm text-headline-sm transition-transform active:scale-[0.98] shadow-md hover:bg-primary flex justify-center items-center gap-2">
                Confirm Payment
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">check_circle</span>
            </button>
            <button
                class="w-full text-center font-body-md text-body-md text-secondary hover:text-on-background transition-colors active:opacity-70">
                Cancel
            </button>
        </div>
    </div>
</body>

</html>
